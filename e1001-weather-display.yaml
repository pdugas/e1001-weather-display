spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

time:
  - platform: homeassistant
    id: ha_time

display:
  - platform: waveshare_epaper
    id: epaper_display
    model: 7.50inv2
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin:
      number: GPIO12
      inverted: false
    busy_pin:
      number: GPIO13
      inverted: true
    update_interval: never # we'll trigger updates ourself
    lambda: |-      
      // now
      auto now = id(ha_time).now();
      struct tm timeinfo = now.to_c_tm();

      // Clear the framebuffer every refresh so previously-rendered values
      // (like "nan") don't stick around when data becomes unavailable.
      it.fill(COLOR_OFF);

      // for use with font::Font::measure()
      int measWidth, measXOoffset, measBaseline, measHeight;

      auto ok_float = [](float v) -> bool { return v == v; };  // NaN check

      const bool is_night = id(sun_state).has_state()
        ? (id(sun_state).state != "above_horizon")
        : (timeinfo.tm_hour < 6 || timeinfo.tm_hour >= 18);

      auto getConditionIcon = [is_night](const std::string &condition) -> const char* {
        if (condition == "sunny") return is_night ? "\U000F0594" : "\U000F0599";
        if (condition == "partlycloudy") return is_night ? "\U000F0F31" : "\U000F0595";
        if (condition == "cloudy") return "\U000F0590";
        if (condition == "rainy") return "\U000F0597";
        if (condition == "snowy") return "\U000F0598";
        if (condition == "pouring") return "\U000F0596";
        if (condition == "lightning") return "\U000F0593";
        if (condition == "clear-night") return "\U000F0594";
        if (condition == "night-partlycloudy") return "\U000F0F31";
        if (condition == "fog") return "\U000F0591";
        if (condition == "hail") return "\U000F0592";
        if (condition == "lightning-rainy") return "\U000F067E";
        if (condition == "snowy-rainy") return "\U000F0F35";
        if (condition == "windy") return "\U000F059D";
        if (condition == "windy-variant") return "\U000F059E";
        if (condition == "exceptional") return "\U000F0F2F";
        return "\U000F0F2F";
      };

      auto getAllergyRatingShort = [](const std::string &rating) -> const char* {
        // IQVIA ratings: Low, Low/Medium, Medium, Medium/High, High.
        if (rating == "Low") return "Low";
        if (rating == "Low/Medium") return "MedLow";
        if (rating == "Medium") return "Med";
        if (rating == "Medium/High") return "MedHigh";
        if (rating == "High") return "High";
        return "";
      };

      auto getPollutionLevelShort = [](const std::string &level) -> const char* {
        // AirVisual enum values: good, moderate, unhealthy_sensitive, unhealthy, very_unhealthy, hazardous
        if (level == "good") return "Good";
        if (level == "moderate") return "Mod";
        if (level == "unhealthy_sensitive") return "USG";
        if (level == "unhealthy") return "Unh";
        if (level == "very_unhealthy") return "VUnh";
        if (level == "hazardous") return "Haz";
        return "";
      };

      // positions
      int left = 0;
      int right = 799;
      int top = 0;
      int bottom = 479;

      // Title/Subtitle
      // --------------------------------------------------------------------------------------------
      auto has_non_ws = [](const char* s) -> bool {
        if (s == nullptr) return false;
        for (; *s; s++) {
          if (*s != ' ' && *s != '\t' && *s != '\r' && *s != '\n') return true;
        }
        return false;
      };

      // Prefer explicit location_name when provided, otherwise fall back to the weather entity's name.
      const char* titleStr = "${location_name}";
      if (!has_non_ws(titleStr)) {
        if (id(weather_friendly_name).has_state() && !id(weather_friendly_name).state.empty()) {
          titleStr = id(weather_friendly_name).state.c_str();
        }
      }
      id(font_40_bold).measure(titleStr, &measWidth, &measXOoffset, &measBaseline, &measHeight);
      it.printf(right, top-measHeight+measBaseline, id(font_40_bold), TextAlign::TOP_RIGHT, titleStr);
      char dateStr[32];
      strftime(dateStr, sizeof(dateStr), "%A, %B %e", &timeinfo);  // e.g. Monday, June 2
      it.printf(right, top-measHeight+2*measBaseline, id(font_30_bold), TextAlign::TOP_RIGHT, dateStr);

      // Footer
      // --------------------------------------------------------------------------------------------
      // battery level
      char battStr[32];
      snprintf(battStr, sizeof(battStr), "%.0f%% (%.1fv)", id(battery_level).state, id(battery_voltage).state);
      it.printf(right, bottom+3, id(font_20), TextAlign::BOTTOM_RIGHT, "%s", battStr);
      id(font_20).measure(battStr, &measWidth, &measXOoffset, &measBaseline, &measHeight);
      right -= measWidth;
      // battery icon
      auto battState = id(battery_level).state;
      const char* iconStr;
      if (battState < 10) {
        iconStr = "\U000F10CD"; // dead
      } else if (battState < 20) {
        iconStr = "\U000F007A"; // 10%
      } else if (battState < 30) {
        iconStr = "\U000F007B"; // 20%
      } else if (battState < 40) {
        iconStr = "\U000F007C"; // 30%
      } else if (battState < 50) {
        iconStr = "\U000F007D"; // 40%
      } else if (battState < 60) {
        iconStr = "\U000F007E"; // 50%
      } else if (battState < 70) {
        iconStr = "\U000F007F"; // 60%
      } else if (battState < 80) {
        iconStr = "\U000F0080"; // 70%
      } else if (battState < 90) {
        iconStr = "\U000F0081"; // 80%
      } else if (battState < 100) {
        iconStr = "\U000F0082"; // 90%
      } else {
        iconStr = "\U000F0079"; // 100%
      }
      it.printf(right, bottom, id(font_icon_20), TextAlign::BOTTOM_RIGHT, iconStr);
      id(font_icon_20).measure(iconStr, &measWidth, &measXOoffset, &measBaseline, &measHeight);
      right -= measWidth + 10;
      // timestamp
      char timeStr[32];
      strftime(timeStr, sizeof(timeStr), "%R %Z", &timeinfo); // e.g. 12:34PM
      it.printf(right, bottom+3, id(font_20), TextAlign::BOTTOM_RIGHT, timeStr);
      id(font_20).measure(timeStr, &measWidth, &measXOoffset, &measBaseline, &measHeight);
      right -= measWidth;
      // restart icon
      iconStr = "\U000F0709";
      it.printf(right, bottom, id(font_icon_20), TextAlign::BOTTOM_RIGHT, iconStr);
      id(font_icon_20).measure(iconStr, &measWidth, &measXOoffset, &measBaseline, &measHeight);
      right -= measWidth + 10;

      // Daily
      // --------------------------------------------------------------------------------------------
      std::string daily_days[4]         = { id(daily_day0).state, id(daily_day1).state, id(daily_day2).state, id(daily_day3).state };
      const bool daily_v2 = id(daily_condition0).has_state()
        && ok_float(id(daily_high0).state)
        && ok_float(id(daily_low0).state)
        && ok_float(id(daily_precip0).state);

      bool freeze_warning = false;
      const bool daily_compat = id(daily_conditionAM0).has_state()
        && id(daily_conditionPM0).has_state()
        && ok_float(id(daily_tempAM0).state)
        && ok_float(id(daily_tempPM0).state)
        && ok_float(id(daily_precipAM0).state)
        && ok_float(id(daily_precipPM0).state);

      const bool daily_has_data = daily_v2 || daily_compat;
      if (!daily_has_data) {
        it.printf(542, 135, id(font_20), TextAlign::CENTER, "Missing Home Assistant templates");
        it.printf(542, 160, id(font_16), TextAlign::CENTER, "Install: home-assistant-e1001-templates.yaml");
        it.printf(542, 180, id(font_16), TextAlign::CENTER, "See README: Home Assistant template sensors");
      } else if (daily_v2) {
        std::string daily_conditions[4] = { id(daily_condition0).state, id(daily_condition1).state, id(daily_condition2).state, id(daily_condition3).state };
        float daily_highs[4]            = { id(daily_high0).state, id(daily_high1).state, id(daily_high2).state, id(daily_high3).state };
        float daily_lows[4]             = { id(daily_low0).state, id(daily_low1).state, id(daily_low2).state, id(daily_low3).state };
        float daily_precips[4]          = { id(daily_precip0).state, id(daily_precip1).state, id(daily_precip2).state, id(daily_precip3).state };

        for (int i = 0; i < 4; i++) {
          if (!daily_days[i].empty()) {
            it.printf(355+i*125,  90, id(font_30_bold), TextAlign::CENTER, "%s", daily_days[i].c_str());
          }
          if (!daily_conditions[i].empty()) {
            it.printf(355+i*125, 150, id(font_icon_50), TextAlign::CENTER, "%s", getConditionIcon(daily_conditions[i]));
          }
          if (ok_float(daily_highs[i]) && ok_float(daily_lows[i])) {
            it.printf(355+i*125, 185, id(font_16), TextAlign::CENTER, "%.0f°/%.0f°", daily_highs[i], daily_lows[i]);
          }
          if (ok_float(daily_precips[i])) {
            it.printf(355+i*125, 205, id(font_16), TextAlign::CENTER, "%.0f%%", daily_precips[i]);
          }

          if (!freeze_warning && ok_float(daily_lows[i]) && (daily_lows[i] <= 32)) {
            freeze_warning = true;
          }
        }
      } else {
        // Back-compat: collapse twice-daily (AM/PM) into a single daily summary.
        std::string daily_conditionsAM[4] = { id(daily_conditionAM0).state, id(daily_conditionAM1).state, id(daily_conditionAM2).state, id(daily_conditionAM3).state };
        std::string daily_conditionsPM[4] = { id(daily_conditionPM0).state, id(daily_conditionPM1).state, id(daily_conditionPM2).state, id(daily_conditionPM3).state };
        float daily_tempsAM[4]            = { id(daily_tempAM0).state, id(daily_tempAM1).state, id(daily_tempAM2).state, id(daily_tempAM3).state };
        float daily_tempsPM[4]            = { id(daily_tempPM0).state, id(daily_tempPM1).state, id(daily_tempPM2).state, id(daily_tempPM3).state };
        float daily_precipsAM[4]          = { id(daily_precipAM0).state, id(daily_precipAM1).state, id(daily_precipAM2).state, id(daily_precipAM3).state };
        float daily_precipsPM[4]          = { id(daily_precipPM0).state, id(daily_precipPM1).state, id(daily_precipPM2).state, id(daily_precipPM3).state };

        for (int i = 0; i < 4; i++) {
          const float high_temp = daily_tempsAM[i] > daily_tempsPM[i] ? daily_tempsAM[i] : daily_tempsPM[i];
          const float low_temp = daily_tempsAM[i] < daily_tempsPM[i] ? daily_tempsAM[i] : daily_tempsPM[i];
          const float precip_chance = daily_precipsAM[i] > daily_precipsPM[i] ? daily_precipsAM[i] : daily_precipsPM[i];
          const std::string &day_condition = (daily_precipsPM[i] >= daily_precipsAM[i]) ? daily_conditionsPM[i] : daily_conditionsAM[i];

          if (!daily_days[i].empty()) {
            it.printf(355+i*125,  90, id(font_30_bold), TextAlign::CENTER, "%s", daily_days[i].c_str());
          }
          if (!day_condition.empty()) {
            it.printf(355+i*125, 150, id(font_icon_50), TextAlign::CENTER, "%s", getConditionIcon(day_condition));
          }
          if (ok_float(high_temp) && ok_float(low_temp)) {
            it.printf(355+i*125, 185, id(font_16), TextAlign::CENTER, "%.0f°/%.0f°", high_temp, low_temp);
          }
          if (ok_float(precip_chance)) {
            it.printf(355+i*125, 205, id(font_16), TextAlign::CENTER, "%.0f%%", precip_chance);
          }

          if (!freeze_warning && ok_float(low_temp) && (low_temp <= 32)) {
            freeze_warning = true;
          }
        }
      }
      if (daily_has_data && freeze_warning) {
        it.printf(345, 40, id(font_30_bold), TextAlign::BOTTOM_CENTER, "Freeze");
        it.printf(345, 20, id(font_30_bold), TextAlign::TOP_CENTER, "Warning");
        it.rectangle(280,0,130,65);
        it.rectangle(281,1,128,63);
      }

      // Hourly
      // --------------------------------------------------------------------------------------------
      const bool hourly_has_data = id(hourly_hour0).has_state()
        && ok_float(id(hourly_temp0).state)
        && ok_float(id(hourly_precip0).state);

      std::string hourly_hours[25] = {
        id(hourly_hour0).state, id(hourly_hour1).state, id(hourly_hour2).state,
        id(hourly_hour3).state, id(hourly_hour4).state, id(hourly_hour5).state,
        id(hourly_hour6).state, id(hourly_hour7).state, id(hourly_hour8).state,
        id(hourly_hour9).state, id(hourly_hour10).state, id(hourly_hour11).state,
        id(hourly_hour12).state, id(hourly_hour13).state, id(hourly_hour14).state,
        id(hourly_hour15).state, id(hourly_hour16).state, id(hourly_hour17).state,
        id(hourly_hour18).state, id(hourly_hour19).state, id(hourly_hour20).state, 
        id(hourly_hour21).state, id(hourly_hour22).state, id(hourly_hour23).state,
        id(hourly_hour24).state,
      };
      float hourly_temps[25] = {
        id(hourly_temp0).state, id(hourly_temp1).state, id(hourly_temp2).state,
        id(hourly_temp3).state, id(hourly_temp4).state, id(hourly_temp5).state,
        id(hourly_temp6).state, id(hourly_temp7).state, id(hourly_temp8).state,
        id(hourly_temp9).state, id(hourly_temp10).state, id(hourly_temp11).state,
        id(hourly_temp12).state, id(hourly_temp13).state, id(hourly_temp14).state,
        id(hourly_temp15).state, id(hourly_temp16).state, id(hourly_temp17).state,
        id(hourly_temp18).state, id(hourly_temp19).state, id(hourly_temp20).state,
        id(hourly_temp21).state, id(hourly_temp22).state, id(hourly_temp23).state,
        id(hourly_temp24).state,
      };
      float hourly_precips[25] = {
        id(hourly_precip0).state, id(hourly_precip1).state, id(hourly_precip2).state,
        id(hourly_precip3).state, id(hourly_precip4).state, id(hourly_precip5).state,
        id(hourly_precip6).state, id(hourly_precip7).state, id(hourly_precip8).state,
        id(hourly_precip9).state, id(hourly_precip10).state, id(hourly_precip11).state,
        id(hourly_precip12).state, id(hourly_precip13).state, id(hourly_precip14).state,
        id(hourly_precip15).state, id(hourly_precip16).state, id(hourly_precip17).state,
        id(hourly_precip18).state, id(hourly_precip19).state, id(hourly_precip20).state,
        id(hourly_precip21).state, id(hourly_precip22).state, id(hourly_precip23).state,
        id(hourly_precip24).state,
      };
      if (!hourly_has_data) {
        it.printf(531, 340, id(font_20), TextAlign::CENTER, "Hourly forecast unavailable");
        it.printf(531, 365, id(font_16), TextAlign::CENTER, "Install HA templates (README)");
      } else {
        for (int i = 0; i < 6; i++) {
          it.printf(310, 410-i*40, id(font_16), TextAlign::CENTER_RIGHT, "%d°", i*20);
          it.line(312, 410-i*40, 748, 410-i*40);
          it.printf(750, 410-i*40, id(font_16), TextAlign::CENTER_LEFT, "%d%%", i*20);
        }
        it.line(312, 409, 748, 409);
        it.line(312, 411, 748, 411);
        for (int i = 1; i < 24; i++) {
          it.rectangle(314+i*18-3, 410-hourly_precips[i]/100*40*5, 7, hourly_precips[i]/100*40*5);
        }
        for (int i = 0; i < 25; i++) {
          if (0 == i%3) {
            it.line(314+i*18, 410, 314+i*18, 415);
            it.printf(314+i*18, 415, id(font_16), TextAlign::TOP_CENTER, "%s", hourly_hours[i].c_str());
          }
          if (i > 0) {
            it.line(314+(i-1)*18, 407-hourly_temps[i-1]/100*40*5, 314+i*18, 407-hourly_temps[i]/100*40*5);
            it.line(314+(i-1)*18, 408-hourly_temps[i-1]/100*40*5, 314+i*18, 408-hourly_temps[i]/100*40*5);
            it.line(314+(i-1)*18, 409-hourly_temps[i-1]/100*40*5, 314+i*18, 409-hourly_temps[i]/100*40*5);
            it.line(314+(i-1)*18, 410-hourly_temps[i-1]/100*40*5, 314+i*18, 410-hourly_temps[i]/100*40*5);
            it.line(314+(i-1)*18, 411-hourly_temps[i-1]/100*40*5, 314+i*18, 411-hourly_temps[i]/100*40*5);
          }
        }
        it.filled_rectangle(314, 450, 10, 5); it.printf(328, 452, id(font_16), TextAlign::CENTER_LEFT, "Temperature (°F)");
        it.rectangle(314, 468, 10, 10); it.printf(328, 472, id(font_16), TextAlign::CENTER_LEFT, "Chance of Rain (%%)");
      }

      // Current
      // --------------------------------------------------------------------------------------------
      it.printf(0, 0, id(font_icon_100), TextAlign::TOP_LEFT, "%s", getConditionIcon(id(current_condition).state));
      if (id(current_temp).has_state() && ok_float(id(current_temp).state)) {
        it.printf(100, -5, id(font_60_bold), TextAlign::TOP_LEFT, "%.0f°F", id(current_temp).state);
      }
      if (id(current_apparent_temp).has_state() && ok_float(id(current_apparent_temp).state)) {
        it.printf(100, 60, id(font_20), TextAlign::TOP_LEFT, "Feels like %.0f°F", id(current_apparent_temp).state);
      }

      it.printf(0, 115, id(font_icon_50), "\U000F059D"); // wind
      it.printf(50, 112, id(font_20), "Wind");
      if (id(current_wind_speed).has_state() && ok_float(id(current_wind_speed).state)) {
        it.printf(50, 135, id(font_22_bold), "%.0fmph", id(current_wind_speed).state);
      }
      it.printf(140, 115, id(font_icon_50), "\U000F058E"); // water-percent
      it.printf(190, 112, id(font_20), "Humidity");
      if (id(current_humidity).has_state() && ok_float(id(current_humidity).state)) {
        it.printf(190, 135, id(font_22_bold), "%.0f%%", id(current_humidity).state);
      }

      it.printf(0, 180, id(font_icon_50), "\U000F0875"); // gauge-low
      it.printf(50, 177, id(font_20), "Pressure");
      if (id(current_pressure).has_state() && ok_float(id(current_pressure).state)) {
        it.printf(50, 200, id(font_22_bold), "%.0finHg", id(current_pressure).state);
      }
      it.printf(140, 180, id(font_icon_50), "\U000F0208"); // eye
      it.printf(190, 177, id(font_20), "Visibility");
      if (id(current_visibility).has_state() && ok_float(id(current_visibility).state)) {
        it.printf(190, 200, id(font_22_bold), "%.0fmi", id(current_visibility).state);
      }

      const bool allergy_enabled = strcmp("${allergy_enabled}", "true") == 0;
      const bool pollution_enabled = strcmp("${pollution_enabled}", "true") == 0;
      const bool show_allergy = allergy_enabled && id(current_allergy_index).has_state() && id(current_allergy_rating).has_state();
      const bool show_pollution = pollution_enabled && id(current_pollution_level).has_state();

      if (show_allergy) {
        it.printf(0, 245, id(font_icon_50), "\U000F1885"); // flower-pollen
        it.printf(50, 242, id(font_20), "Allergy");
        it.printf(50, 265, id(font_22_bold), "%s", getAllergyRatingShort(id(current_allergy_rating).state));
      }

      if (show_pollution) {
        const int x_icon = show_allergy ? 140 : 0;
        const int x_text = show_allergy ? 190 : 50;
        it.printf(x_icon, 245, id(font_icon_50), "\U000F0A71"); // smog
        it.printf(x_text, 242, id(font_20), "Pollution");
        it.printf(x_text, 265, id(font_22_bold), "%s", getPollutionLevelShort(id(current_pollution_level).state));
      }

      it.printf(0, 310, id(font_icon_50), "\U000F059C"); // sunrise
      it.printf(50, 307, id(font_20), "Dawn");
      if (id(current_dawn).has_state() && !id(current_dawn).state.empty()) {
        it.printf(50, 330, id(font_22_bold), "%s", id(current_dawn).state.c_str());
      } else {
        it.printf(50, 330, id(font_22_bold), "--");
      }
      it.printf(140, 310, id(font_icon_50), "\U000F059B"); // sunset
      it.printf(190, 307, id(font_20), "Dusk");
      if (id(current_dusk).has_state() && !id(current_dusk).state.empty()) {
        it.printf(190, 330, id(font_22_bold), "%s", id(current_dusk).state.c_str());
      } else {
        it.printf(190, 330, id(font_22_bold), "--");
      }
      
      it.printf(140, 420, id(font_30_bold), TextAlign::BOTTOM_CENTER, "Inside");
      it.rectangle(0, 415, 280, 2);
      it.printf(0, 425, id(font_icon_50), "\U000F050F"); // thermometer
      it.printf(45, 422, id(font_20), "Temp");
      if (id(sht4x_temp).has_state() && ok_float(id(sht4x_temp).state)) {
        it.printf(45, 445, id(font_22_bold), "%.0f°F", id(sht4x_temp).state * 9.0/5.0 + 32.0);
      }
      it.printf(140, 425, id(font_icon_50), "\U000F058E"); // water-percent
      it.printf(185, 422, id(font_20), "Humidity");
      if (id(sht4x_hum).has_state() && ok_float(id(sht4x_hum).state)) {
        it.printf(185, 445, id(font_22_bold), "%.0f%%", id(sht4x_hum).state);
      }
