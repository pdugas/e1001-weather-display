substitutions:
  location_name: "Canton, Georgia"

  weather_entity_id: "weather.nws"
  sun_entity_id: "sun.sun"
  # Provide flattened daily forecast attributes (see `home-assistant-e1001-templates.yaml`)
  daily_forecast_entity_id: "sensor.e1001_daily_forecast"
  hourly_forecast_entity_id: "sensor.e1001_hourly_forecast"
  sun_info_entity_id: "sensor.e1001_sun_info"

  allergy_enabled: "true"
  allergy_index_entity_id: "sensor.allergy_index_today"

  pollution_enabled: "true"
  pollution_level_entity_id: "sensor.u_s_air_pollution_level"

esphome:
  project:
    name: esphome.e1001-weather-display
    version: dev
  on_boot:
    priority: 600
    then:
      - output.turn_on: bsp_battery_enable
      - delay: 500ms
      - component.update: battery_voltage
      - component.update: battery_level
      - component.update: sht4x_component
      # Force at least one display refresh per boot.
      # Home Assistant-backed sensors may not have values immediately.
      - delay: 3s
      - component.update: epaper_display
      - delay: 20s
      - component.update: epaper_display
deep_sleep:
  id: deep_sleep_1
  run_duration: 30s 
  sleep_duration: 30min
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

