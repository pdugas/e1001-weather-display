i2c:
  scl: GPIO20
  sda: GPIO19

output:
  - platform: ledc
    pin: GPIO45
    id: rtttl_out
    frequency: 1000Hz
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

rtttl:
  output: rtttl_out
  id: my_rtttl
  gain: 60%

sensor:
  # temp/humidity
  - platform: sht4x
    id: sht4x_component
    temperature:
      name: "Temperature"
      id: sht4x_temp
      device_class: temperature
      unit_of_measurement: "°C"
    humidity:
      name: "Humidity"
      id: sht4x_hum
      device_class: humidity
      unit_of_measurement: "%"
    update_interval: never # disable updates; we'll do it manually

  # battery
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    attenuation: 12db
    device_class: voltage
    filters:
      - multiply: 2.0  # Voltage divider compensation
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100

  # current
  - platform: homeassistant
    id: current_temp
    entity_id: ${weather_entity_id}
    attribute: temperature
    internal: True
    on_value: 
      then:
        - component.update: epaper_display
  - platform: homeassistant
    id: current_humidity
    entity_id: ${weather_entity_id}
    attribute: humidity
    internal: True
  - platform: homeassistant
    id: current_pressure
    entity_id: ${weather_entity_id}
    attribute: pressure
    internal: True
  - platform: homeassistant
    id: current_wind_speed
    entity_id: ${weather_entity_id}
    attribute: wind_speed
    internal: True
  - platform: homeassistant
