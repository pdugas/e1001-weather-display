    entity_id: ${allergy_index_entity_id}
    internal: True

  # daily temps
  - platform: homeassistant
    id: daily_tempAM0
    entity_id: ${daily_forecast_entity_id}
    attribute: tempAM0
    internal: true
  - platform: homeassistant
