name: Publish Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@2025.10.0
    with:
      files: |
        e1001-weather-display-esp32.factory.yaml
        e1001-weather-display-esp32-c3.factory.yaml
        e1001-weather-display-esp32-c6.factory.yaml
        e1001-weather-display-esp32-s3.factory.yaml
      esphome-version: 2026.1.1
      combined-name: e1001-weather-display

      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}

  upload-to-release:
    name: Upload to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.10.0
    needs:
      - build-firmware
    with:
      version: ${{ github.event.release.tag_name }}
