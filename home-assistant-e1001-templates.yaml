- trigger:
    - platform: time_pattern
      minutes: "/30"
    - platform: homeassistant
      event: start
  variables:
    # Must match the ESPHome display substitution:
    #   substitutions.sun_entity_id (usually `sun.sun`)
    e1001_sun_entity: sun.sun
  sensor:
    - name: e1001_sun_info
      unique_id: e1001_sun_info
      state: "{{ now().isoformat() }}"
      attributes:
        dawn: "{{ as_timestamp(state_attr(e1001_sun_entity,'next_dawn')) | timestamp_custom('%I:%M%p', True) }}"
        dusk: "{{ as_timestamp(state_attr(e1001_sun_entity,'next_dusk')) | timestamp_custom('%I:%M%p', True) }}"

