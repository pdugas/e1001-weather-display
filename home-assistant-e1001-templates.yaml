# Home Assistant templates for the e1001 weather display
#
# Paste this into your HA `templates.yaml` (or your `configuration.yaml` templates section).
# It creates sensors that ESPHome can read via `platform: homeassistant`:
# - `sensor.e1001_daily_forecast`
# - `sensor.e1001_hourly_forecast`
# - `sensor.e1001_sun_info`
#
# Configure the weather entity ID below (e.g. `weather.pirateweather` or `weather.nws`).
#
# Notes:
# - This uses the `weather.get_forecasts` service and flattens the response into simple attributes.
# - The ESPHome package expects (daily): `day0..day4`, `condition0..condition4`, `high0..high4`, `low0..low4`, `precip0..precip4`
# - The ESPHome package expects (hourly): `hour0..hour24`, `temp0..temp24`, `precip0..precip24`
#
# Home Assistant 2025.2+ syntax is assumed.

- trigger:
    - platform: time_pattern
      minutes: "/30"
    - platform: homeassistant
      event: start
  variables:
    # Must match the ESPHome display substitution:
    #   substitutions.weather_entity_id (e.g. `weather.nws`, `weather.pirateweather`)
    e1001_weather_entity: weather.pirateweather
  action:
    - service: weather.get_forecasts
      target:
        entity_id: "{{ e1001_weather_entity }}"
      data:
        type: daily
      response_variable: e1001_daily
    - service: weather.get_forecasts
      target:
        entity_id: "{{ e1001_weather_entity }}"
      data:
        type: hourly
      response_variable: e1001_hourly
  sensor:
    - name: e1001_daily_forecast
      unique_id: e1001_daily_forecast
      state: "{{ now().isoformat() }}"
      attributes:
        # 5-day forecast
        day0: >
          {% set dt = as_datetime(e1001_daily[e1001_weather_entity].forecast[0].datetime) %}
          {{ dt.strftime('%a') }}
        condition0: "{{ e1001_daily[e1001_weather_entity].forecast[0].condition }}"
        high0: "{{ e1001_daily[e1001_weather_entity].forecast[0].temperature | float(none) }}"
        low0: "{{ e1001_daily[e1001_weather_entity].forecast[0].templow | float(none) }}"
        precip0: "{{ e1001_daily[e1001_weather_entity].forecast[0].precipitation_probability | float(0) }}"

        day1: >
          {% set dt = as_datetime(e1001_daily[e1001_weather_entity].forecast[1].datetime) %}
          {{ dt.strftime('%a') }}
        condition1: "{{ e1001_daily[e1001_weather_entity].forecast[1].condition }}"
        high1: "{{ e1001_daily[e1001_weather_entity].forecast[1].temperature | float(none) }}"
        low1: "{{ e1001_daily[e1001_weather_entity].forecast[1].templow | float(none) }}"
        precip1: "{{ e1001_daily[e1001_weather_entity].forecast[1].precipitation_probability | float(0) }}"

        day2: >
          {% set dt = as_datetime(e1001_daily[e1001_weather_entity].forecast[2].datetime) %}
          {{ dt.strftime('%a') }}
        condition2: "{{ e1001_daily[e1001_weather_entity].forecast[2].condition }}"
        high2: "{{ e1001_daily[e1001_weather_entity].forecast[2].temperature | float(none) }}"
        low2: "{{ e1001_daily[e1001_weather_entity].forecast[2].templow | float(none) }}"
        precip2: "{{ e1001_daily[e1001_weather_entity].forecast[2].precipitation_probability | float(0) }}"

        day3: >
          {% set dt = as_datetime(e1001_daily[e1001_weather_entity].forecast[3].datetime) %}
          {{ dt.strftime('%a') }}
        condition3: "{{ e1001_daily[e1001_weather_entity].forecast[3].condition }}"
        high3: "{{ e1001_daily[e1001_weather_entity].forecast[3].temperature | float(none) }}"
        low3: "{{ e1001_daily[e1001_weather_entity].forecast[3].templow | float(none) }}"
        precip3: "{{ e1001_daily[e1001_weather_entity].forecast[3].precipitation_probability | float(0) }}"

        day4: >
          {% set dt = as_datetime(e1001_daily[e1001_weather_entity].forecast[4].datetime) %}
          {{ dt.strftime('%a') }}
        condition4: "{{ e1001_daily[e1001_weather_entity].forecast[4].condition }}"
        high4: "{{ e1001_daily[e1001_weather_entity].forecast[4].temperature | float(none) }}"
        low4: "{{ e1001_daily[e1001_weather_entity].forecast[4].templow | float(none) }}"
        precip4: "{{ e1001_daily[e1001_weather_entity].forecast[4].precipitation_probability | float(0) }}"

    - name: e1001_hourly_forecast
      unique_id: e1001_hourly_forecast
